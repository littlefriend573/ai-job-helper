<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Job Helper</title>
  <style>
    body {
      width: 320px;
      min-height: 400px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg {
      width: 28px;
      height: 28px;
      fill: white;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      color: #1f2937;
      margin: 0;
    }
    .subtitle {
      font-size: 12px;
      color: #6b7280;
      margin: 4px 0 0;
    }
    .status {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #e5e7eb;
    }
    .status-item:last-child {
      border-bottom: none;
    }
    .status-label {
      font-size: 12px;
      color: #6b7280;
    }
    .status-value {
      font-size: 12px;
      font-weight: 600;
      color: #1f2937;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background: #e5e7eb;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }
    .jd-item {
      background: #f9fafb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .jd-title {
      font-size: 13px;
      font-weight: 600;
      color: #1f2937;
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .jd-company {
      font-size: 11px;
      color: #6b7280;
      margin: 0;
    }
    .jd-list {
      max-height: 150px;
      overflow-y: auto;
    }
    .empty-state {
      text-align: center;
      padding: 24px 12px;
      color: #9ca3af;
    }
    .empty-state svg {
      width: 48px;
      height: 48px;
      fill: #d1d5db;
      margin-bottom: 12px;
    }
    .empty-state p {
      font-size: 13px;
      margin: 0;
    }
    .sync-status {
      font-size: 11px;
      text-align: center;
      margin-top: 12px;
      color: #10b981;
    }
    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-top: 12px;
    }
    .settings-link {
      display: block;
      text-align: center;
      font-size: 12px;
      color: #6366f1;
      text-decoration: none;
      margin-top: 16px;
    }
    .settings-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      </div>
      <h1 class="title">AI Job Helper</h1>
      <p class="subtitle">智能求职助手</p>
    </div>

    <div class="status">
      <div class="status-item">
        <span class="status-label">已收集JD</span>
        <span class="status-value" id="jd-count">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">服务地址</span>
        <span class="status-value" id="server-url">未设置</span>
      </div>
    </div>

    <div class="jd-list" id="jd-list">
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm2 18H6v-2h10v2zm0-4H6v-2h10v2zm-3-5V3.5L18.5 9H13z"/>
        </svg>
        <p>访问Boss直聘职位页面<br/>点击下方按钮收集JD</p>
      </div>
    </div>

    <button class="btn btn-primary" id="capture-btn">
      🎯 一键收集JD
    </button>
    
    <button class="btn btn-secondary" id="sync-btn">
      📤 发送到Job Helper
    </button>

    <div id="sync-status" class="sync-status" style="display: none;">
      ✅ 已同步到Job Helper
    </div>

    <div id="error-message" class="error-message" style="display: none;"></div>

    <a href="#" class="settings-link" id="settings-link">⚙️ 服务设置</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
